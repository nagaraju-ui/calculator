<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Family Finance Manager</title>
<style>
:root{--bg:#f4f5f7;--card:#fff;--ink:#1d1d1f;--muted:#6b7280;--line:#e5e7eb;--accent:#3b6ef5;--pos:#138a4e;--neg:#c0392b;font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,sans-serif}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink)}
.app{max-width:1000px;margin:0 auto;padding:16px}
header{display:flex;align-items:center;justify-content:space-between}
h1{font-size:20px;margin:8px 0}h2{font-size:15px;margin:0 0 10px}
.muted{color:var(--muted)}.small{font-size:12px}
.card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px;margin-bottom:14px}
input,select,button{font:inherit;padding:9px 11px;border:1px solid var(--line);border-radius:9px;background:#fff}
button{cursor:pointer}button.primary{background:var(--accent);color:#fff;border-color:var(--accent);font-weight:600}
button.link{background:none;border:none;color:var(--accent)}button.x{background:none;border:none;color:var(--muted);font-size:16px}
.err{color:var(--neg);font-size:13px}
.auth{min-height:100vh;display:grid;place-items:center;padding:16px}
.auth-card{width:100%;max-width:340px;display:flex;flex-direction:column;gap:10px}
.net.pos{border-left:5px solid var(--pos)}.net.neg{border-left:5px solid var(--neg)}
.net-main{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.net-amount{font-size:30px;font-weight:800}.net.pos .net-amount{color:var(--pos)}.net.neg .net-amount{color:var(--neg)}
.badge{font-size:12px;font-weight:700;padding:3px 10px;border-radius:999px}
.badge.pos{background:#e6f5ec;color:var(--pos)}.badge.neg{background:#fbeae8;color:var(--neg)}
.net-break{display:flex;gap:18px;flex-wrap:wrap;margin-top:14px}
.stat{display:flex;flex-direction:column}.stat .muted{font-size:12px}
.filters{display:flex;gap:14px;align-items:center;flex-wrap:wrap}
.filters label{font-size:13px;color:var(--muted);display:flex;gap:6px;align-items:center}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}@media(max-width:760px){.grid{grid-template-columns:1fr}}
.row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}.row>*{flex:1 1 120px}.row button.primary{flex:0 0 auto}
.list{list-style:none;margin:0;padding:0}
.list li{display:flex;align-items:center;gap:10px;padding:9px 0;border-top:1px solid var(--line)}
.list .grow{flex:1}.dot{width:9px;height:9px;border-radius:50%;flex:0 0 auto}
.dot.income{background:var(--pos)}.dot.expense{background:var(--neg)}
strong.income{color:var(--pos)}strong.expense{color:var(--neg)}
</style>
</head>
<body>
<div id="root"></div>
<script type="module">
const KEY='ffm_token';
const getTok=()=>localStorage.getItem(KEY)||'';
const setTok=t=>t?localStorage.setItem(KEY,t):localStorage.removeItem(KEY);
const fmt=p=>'₹'+(Number(p)/100).toLocaleString('en-IN',{minimumFractionDigits:2,maximumFractionDigits:2});
const toPaise=r=>Math.round(Number(r)*100);
const today=()=>new Date().toISOString().slice(0,10);
const API='/api';
  async function req(m,path,body){ path=API+path;
  const res=await fetch(path,{method:m,headers:{'Content-Type':'application/json',...(getTok()?{Authorization:'Bearer '+getTok()}:{})},body:body?JSON.stringify(body):undefined});
  if(!res.ok)throw new Error((await res.json().catch(()=>({}))).error||res.statusText);
  return res.status===204?null:res.json();
}
const api={
  login:(e,p)=>req('POST','/auth/login',{email:e,password:p}),
  register:(n,e,p)=>req('POST','/auth/register',{name:n,email:e,password:p}),
  summary:q=>req('GET','/summary'+(q||'')),
  txns:q=>req('GET','/transactions'+(q||'')),
  addTxn:t=>req('POST','/transactions',t),
  delTxn:id=>req('DELETE','/transactions/'+id),
  cats:()=>req('GET','/categories'),
  loans:()=>req('GET','/loans'),
  addLoan:l=>req('POST','/loans',l),
  closeLoan:id=>req('PUT','/loans/'+id+'/close'),
};
const el=(t,a={},...kids)=>{const n=document.createElement(t);for(const[k,v]of Object.entries(a)){if(k==='class')n.className=v;else if(k.startsWith('on'))n.addEventListener(k.slice(2),v);else if(k==='html')n.innerHTML=v;else n.setAttribute(k,v);}for(const c of kids.flat())n.append(c?.nodeType?c:document.createTextNode(c??''));return n;};
const root=document.getElementById('root');

function render(){ getTok()?dashboard():login(); }

function login(){
  let mode='login';
  root.innerHTML='';
  const wrap=el('div',{class:'auth'});
  const draw=()=>{
    wrap.innerHTML='';
    const name=el('input',{placeholder:'Your name'});
    const email=el('input',{type:'email',placeholder:'Email',value:'family@home.com'});
    const pass=el('input',{type:'password',placeholder:'Password',value:'password123'});
    const err=el('div',{class:'err'});
    const form=el('form',{class:'card auth-card',onsubmit:async ev=>{ev.preventDefault();err.textContent='';try{const r=mode==='login'?await api.login(email.value,pass.value):await api.register(name.value,email.value,pass.value);setTok(r.token);render();}catch(e){err.textContent=e.message;}}},
      el('h1',{},'Family Finance'),
      el('p',{class:'muted'},mode==='login'?'Sign in to your family account':'Create your family account'),
      ...(mode==='register'?[name]:[]),email,pass,err,
      el('button',{class:'primary',type:'submit'},mode==='login'?'Sign in':'Create account'),
      el('button',{class:'link',type:'button',onclick:()=>{mode=mode==='login'?'register':'login';draw();}},mode==='login'?'Need an account? Register':'Have an account? Sign in'));
    wrap.append(form);
  };
  draw(); root.append(wrap);
}

async function dashboard(){
  root.innerHTML='';
  const state={from:'',to:''};
  const app=el('div',{class:'app'});
  root.append(app);
  const reload=async()=>{
    const q=(state.from||state.to)?`?from=${state.from}&to=${state.to}`:'';
    const[s,t,l,c]=await Promise.all([api.summary(q),api.txns(q),api.loans(),api.cats()]);
    paint(s,t,l,c);
  };
  function paint(s,txns,loans,cats){
    app.innerHTML='';
    app.append(el('header',{},el('h1',{},'Family Finance'),el('button',{class:'link',onclick:()=>{setTok('');render();}},'Logout')));
    // net card
    const profit=s.status==='PROFIT';
    app.append(el('div',{class:'card net '+(profit?'pos':'neg')},
      el('div',{class:'net-main'},
        el('span',{class:'muted'},'Family Net Position'),
        el('span',{class:'net-amount'},(profit?'+ ':'− ')+fmt(Math.abs(s.netPosition))),
        el('span',{class:'badge '+(profit?'pos':'neg')},s.status)),
      el('div',{class:'net-break'},
        stat('Income',fmt(s.totalIncome)),stat('Expenses',fmt(s.totalExpenses)),stat('Operating',fmt(s.operatingBalance)),
        stat('Lent + interest',fmt(s.loansGiven.principalOutstanding+s.loansGiven.interestReceivable)),
        stat('Borrowed + interest',fmt(s.loansTaken.principalOutstanding+s.loansTaken.interestPayable)))));
    // filters
    const from=el('input',{type:'date',value:state.from}),to=el('input',{type:'date',value:state.to});
    from.addEventListener('change',e=>{state.from=e.target.value;reload();});
    to.addEventListener('change',e=>{state.to=e.target.value;reload();});
    app.append(el('div',{class:'filters card'},el('label',{},'From ',from),el('label',{},'To ',to),el('button',{class:'link',onclick:()=>{state.from='';state.to='';reload();}},'Clear')));
    // panels
    app.append(el('div',{class:'grid'},txnPanel(txns,cats,reload),loanPanel(loans,reload)));
  }
  function stat(l,v){return el('div',{class:'stat'},el('span',{class:'muted'},l),el('strong',{},v));}
  reload();
}

function txnPanel(txns,cats,reload){
  const f={kind:'expense',amount:'',category_id:'',note:'',txn_date:today()};
  const kind=el('select',{},el('option',{value:'income'},'Income'),el('option',{value:'expense',selected:'true'},'Expense'));
  const amount=el('input',{type:'number',step:'0.01',min:'0',placeholder:'Amount ₹'});
  const cat=el('select',{});
  const fillCats=()=>{cat.innerHTML='';cat.append(el('option',{value:''},'Category…'));cats.filter(c=>c.kind===kind.value).forEach(c=>cat.append(el('option',{value:c.id},c.name)));};
  kind.addEventListener('change',fillCats);fillCats();
  const date=el('input',{type:'date',value:f.txn_date});
  const note=el('input',{placeholder:'Note'});
  const form=el('form',{class:'row',onsubmit:async ev=>{ev.preventDefault();await api.addTxn({kind:kind.value,amount_paise:toPaise(amount.value),category_id:cat.value?Number(cat.value):null,note:note.value||null,txn_date:date.value});amount.value='';note.value='';reload();}},
    kind,amount,cat,date,note,el('button',{class:'primary',type:'submit'},'Add'));
  const list=el('ul',{class:'list'});
  if(!txns.length)list.append(el('li',{class:'muted'},'No entries yet.'));
  txns.forEach(t=>list.append(el('li',{},
    el('span',{class:'dot '+t.kind}),
    el('span',{class:'grow'},t.category_name||t.note||t.kind),
    el('span',{class:'muted small'},t.txn_date),
    el('strong',{class:t.kind},(t.kind==='income'?'+':'−')+fmt(t.amount_paise)),
    el('button',{class:'x',onclick:async()=>{await api.delTxn(t.id);reload();}},'×'))));
  return el('div',{class:'card'},el('h2',{},'Income & Expenses'),form,list);
}

function loanPanel(loans,reload){
  const cp=el('input',{placeholder:'Person / bank'});
  const dir=el('select',{},el('option',{value:'given'},'Given (we lent)'),el('option',{value:'taken'},'Taken (we borrowed)'));
  const principal=el('input',{type:'number',step:'0.01',placeholder:'Principal ₹'});
  const rate=el('input',{type:'number',step:'0.01',placeholder:'Rate %'});
  const basis=el('select',{},el('option',{value:'annual'},'per year'),el('option',{value:'monthly'},'per month'),el('option',{value:'daily'},'per day'));
  const start=el('input',{type:'date',value:today()});
  const form=el('form',{class:'row',onsubmit:async ev=>{ev.preventDefault();await api.addLoan({counterparty:cp.value,direction:dir.value,principal_paise:toPaise(principal.value),interest_rate:Number(rate.value),rate_basis:basis.value,start_date:start.value});cp.value='';principal.value='';rate.value='';reload();}},
    cp,dir,principal,rate,basis,start,el('button',{class:'primary',type:'submit'},'Add'));
  const list=el('ul',{class:'list'});
  if(!loans.length)list.append(el('li',{class:'muted'},'No loans yet.'));
  loans.forEach(l=>list.append(el('li',{},
    el('span',{class:'dot '+(l.direction==='given'?'income':'expense')}),
    el('span',{class:'grow'},l.counterparty+' ',el('span',{class:'muted small'},`(${l.direction}, ${l.interest_rate}% ${l.rate_basis})`)),
    el('span',{class:'small muted'},'+int '+fmt(l.interest_paise)),
    el('strong',{},fmt(l.total_paise)),
    ...(l.status==='active'?[el('button',{class:'x',title:'close',onclick:async()=>{await api.closeLoan(l.id);reload();}},'✓')]:[]))));
  return el('div',{class:'card'},el('h2',{},'Loans & Simple Interest'),form,list);
}

render();
</script>
</body>
</html>
